  <text x="88" y="280" fill="#ffffff" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="76" font-weight="700">belong inside</text>
  <text x="88" y="354" fill="#ffffff" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="76" font-weight="700">the workflow</text>
  <text x="88" y="432" fill="#d7e4ff" font-family="Manrope, Segoe UI, sans-serif" font-size="28">Customer commitments are stronger when invoice context stays attached.</text>

